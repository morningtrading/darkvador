# Asset groups live in config/asset_groups.yaml.
# Manage them with: py -3.12 main.py groups <list|add|remove|edit|...>

broker:
  paper_trading: true
  asset_group: stocks
  symbols:
  - SPY
  - QQQ
  - AAPL
  - MSFT
  - AMZN
  - GOOGL
  - NVDA
  - META
  - TSLA
  - AMD
  timeframe: 5Min
  base_url_paper: https://paper-api.alpaca.markets
  base_url_live: https://api.alpaca.markets
  data_feed: iex
hmm:
  n_candidates:
  - 3
  - 4
  - 5
  - 6
  - 7
  n_init: 10
  covariance_type: full
  min_train_bars: 252
  stability_bars: 5              # cs-sweep validated optimum for indices
  flicker_window: 20
  flicker_threshold: 2
  min_confidence: 0.68           # joint optimum: interval+cs sweeps on indices 2020-2026
  extended_features: true   # true (default): adds vol_ratio, adx_14, dist_sma200 — set false to revert to base only
  use_vix_features: true     # adds vix_zscore_60 cross-asset feature (fetches ^VIX daily via yfinance, VXX fallback). Indices: Sharpe 0.263 -> 0.446, MaxDD -31% -> -23%
  use_credit_spread_features: false  # adds credit_spread_z60 = z-score(HYG/LQD ratio). Indices test: redundant with VIX_zscore (stacking hurts 0.446 -> 0.350); alone on EXT marginal (+0.024 Sharpe). Kept as opt-in.
  features:
  - log_ret_1
  - realized_vol_20
  blend_exclude:           # symbols excluded from log_ret_1 / realized_vol_20 blending
  - GLD                    # non-equity assets add cross-asset noise to the HMM feature blend
strategy:
  low_vol_allocation: 0.95
  mid_vol_allocation_trend: 0.95
  mid_vol_allocation_no_trend: 0.75
  high_vol_allocation: 0.75
  low_vol_leverage: 1.25
  rebalance_threshold: 0.15
  uncertainty_size_mult: 0.5
  trend_lookback: 50
  trend_min_slope: 0.0
  sma_hard_gate: false  # force flat when market proxy < SMA200. Tested: degrades indices Sharpe 0.446 -> 0.273 (double-filter kills signal). Kept as opt-in tool.
  sma_soft_mult: 1.0    # 1.0 = disabled. Sweep on indices: 0.7 → Sharpe 0.442 / MaxDD -19.5%; 0.5 → Sharpe 0.425 / MaxDD -17.3%; 1.0 → Sharpe 0.446 / MaxDD -22.9%. Keep off by default; opt-in for drawdown-sensitive users.
  vol_target_annual: 0.0   # scale LONG sizes to realize this annualized vol. 0 = disabled. Tested: 0.10/0.12 hurt Sharpe (risk-free 4.5% eats excess return when vol compressed). Opt-in sweep: 0.06-0.08 might help (not yet tested).
  vol_target_min_mult: 0.25
  vol_target_max_mult: 1.50
  vol_target_window: 20
  sma_blend_weight: 1.0  # HMM <-> SMA ensemble. 1.0 = pure HMM (default). 0.0 = pure SMA-200 EW. Blend: size_i = w*hmm_size + (1-w)*sma_ew_weight. Tests TBD on indices.
risk:
  max_risk_per_trade: 0.01
  max_single_position: 0.15
  max_concurrent: 5
  max_daily_trades: 20
  max_exposure: 0.8
  max_leverage: 1.25
  daily_dd_reduce: 0.02
  daily_dd_halt: 0.03
  weekly_dd_reduce: 0.05
  weekly_dd_halt: 0.07
  max_dd_from_peak: 0.1
  allow_fractional_shares: false   # Alpaca supports fractional equities + crypto. Set true to avoid capital idling due to whole-share rounding.
  fractional_precision: 6          # decimal places when fractional shares are enabled
backtest:
  initial_capital: 100000
  slippage_pct: 0.0005
  min_rebalance_interval: 0   # 0 = off; set to N to lock out rebalances for N bars after each one
  train_window: 63   # IS bars — 3 months daily (~63 bars). Previous: 252 (12m)
  test_window: 42    # OOS bars — 2 months daily (~42 bars). Previous: 126 (6m)
  step_size: 42      # Step bars — 2 months daily (~42 bars). Previous: 126 (6m)
  risk_free_rate: 0.045
  benchmark_symbol: SPY
  commission_per_share: 0.0
  min_commission: 0.0
  # Benchmark overlay parameters (also used by strategy SMA gates)
  sma_long: 200        # SMA window for trend benchmark / gate (daily bars on indices; scale for 5Min)
  ema_fast: 9          # EMA crossover fast period
  ema_slow: 45         # EMA crossover slow period
monitoring:
  dashboard_refresh_seconds: 5
  alert_rate_limit_minutes: 15
  log_level: INFO
  log_dir: logs/
  log_rotation_mb: 50
