# conservative.yaml — low-churn, capital-preservation profile
# Only overrides that differ from config/settings.yaml base.

hmm:
  n_candidates: [5]              # fixed 5-state → always CRASH/BEAR/NEUTRAL/BULL/EUPHORIA, reproducible across machines
  stability_bars: 9              # 9 bars (~2 weeks) to confirm regime flip
  flicker_threshold: 5           # tolerate up to 5 changes in 20 bars
  min_confidence: 0.60           # realistic floor for 4-5 state HMM

strategy:
  low_vol_allocation:         0.90
  mid_vol_allocation_trend:   0.85
  mid_vol_allocation_no_trend: 0.60
  high_vol_allocation:        0.45   # genuinely defensive
  low_vol_leverage:           1.0    # no leverage
  rebalance_threshold:        0.25   # only rebalance on large drifts

risk:
  max_leverage:       1.0
  daily_dd_halt:      0.025
  weekly_dd_halt:     0.06
  max_dd_from_peak:   0.08

backtest:
  slippage_pct: 0.0005           # 5 bps per side (standard)
