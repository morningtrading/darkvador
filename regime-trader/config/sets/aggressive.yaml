# aggressive.yaml — maximum deployment, higher leverage, responsive regime switching
# Only overrides that differ from config/settings.yaml base.

hmm:
  n_candidates: [3, 4, 5, 6, 7]
  stability_bars: 5
  flicker_threshold: 3
  min_confidence: 0.58           # act on weaker signals

strategy:
  low_vol_allocation:         1.00   # fully invested in calm markets
  mid_vol_allocation_trend:   0.95
  mid_vol_allocation_no_trend: 0.80
  high_vol_allocation:        0.70
  low_vol_leverage:           1.50   # higher leverage in bull/low-vol
  rebalance_threshold:        0.10   # responsive rebalancing

risk:
  max_leverage:      1.50
  max_exposure:      0.95
  max_single_position: 0.20

backtest:
  slippage_pct: 0.0010           # 10 bps per side
