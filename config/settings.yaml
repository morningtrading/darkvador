# ──────────────────────────────────────────────────────────────────────────────
# Canonical platform: Linux (native or WSL2) — see README.md "Cross-platform
# reproducibility". Windows produces different backtest numbers (~20-25pp on
# return) due to BLAS/float accumulation in the HMM fit. Decisions must be
# made from Linux runs only.
# ──────────────────────────────────────────────────────────────────────────────
broker:
  paper_trading: true
  asset_group: stocks    # symbols resolved from config/asset_groups.yaml
  timeframe: 5Min        # main-loop cadence: how often the bot wakes up to
                         #  evaluate signals, check risk, post fills. Set to
                         #  5Min for paper testing of intraday behaviour.
                         #  Supported: 1Day, 1Hour, 5Min, 1Min.
  base_url_paper: https://paper-api.alpaca.markets
  base_url_live: https://api.alpaca.markets
  data_feed: iex
hmm:
  timeframe: 1Day        # bar size on which the HMM is trained and predicts
                         #  regimes. Independent from broker.timeframe so the
                         #  main loop can tick intraday while regimes stay
                         #  macro (the original design intent — regimes are
                         #  not meant to flicker on 5-min noise).
  n_candidates:
  - 5
  n_init: 10
  covariance_type: full
  min_train_bars: 252
  stability_bars: 12
  flicker_window: 20
  flicker_threshold: 4
  min_confidence: 0.62
  extended_features: true
  use_vix_features: true
  use_credit_spread_features: false
  regime_proxy: QQQ
  features:
  - log_ret_1
  - realized_vol_20
  blend_exclude:
  - GLD
  - VNQ
  - EFA
  - EEM
  - EWG
strategy:
  low_vol_allocation: 0.95
  mid_vol_allocation_trend: 0.95
  mid_vol_allocation_no_trend: 0.70
  high_vol_allocation: 0.60
  low_vol_leverage: 1.25
  rebalance_threshold: 0.18
  uncertainty_size_mult: 0.5
  trend_lookback: 50
  trend_min_slope: 0.0
  sma_hard_gate: false
  sma_soft_mult: 1.0
  vol_target_annual: 0.0
  vol_target_min_mult: 0.25
  vol_target_max_mult: 1.5
  vol_target_window: 20
  sma_blend_weight: 1.0
  skip_neutral_regime: true
  mid_vol_atr_mult: 0.5      # ATR multiplier for MidVol stop (50EMA - mult*ATR)
  high_vol_atr_mult: 1.0     # ATR multiplier for HighVol stop (50EMA - mult*ATR)
risk:
  max_risk_per_trade: 0.01
  max_single_position: 0.15
  max_concurrent: 5
  max_daily_trades: 20
  max_exposure: 0.8
  max_leverage: 1.25
  daily_dd_reduce: 0.02
  daily_dd_halt: 0.03
  weekly_dd_reduce: 0.05
  weekly_dd_halt: 0.07
  max_dd_from_peak: 0.1
  allow_fractional_shares: false
  fractional_precision: 6
backtest:
  initial_capital: 100000
  slippage_pct: 0.0005
  min_rebalance_interval: 5
  train_window: 252
  test_window: 63
  step_size: 63
  risk_free_rate: 0.045
  benchmark_symbol: SPY
  commission_per_share: 0.0
  min_commission: 0.0
  sma_long: 200
  ema_fast: 9
  ema_slow: 45
monitoring:
  dashboard_refresh_seconds: 5
  alert_rate_limit_minutes: 15
  log_level: INFO
  log_dir: logs/
  log_rotation_mb: 50
strategies:
  hmm_regime:
    enabled: true
    symbols:
    - SPY
    weight_min: 0.1
    weight_max: 0.5
  momentum_breakout:
    enabled: false
    symbols:
    - AAPL
    - NVDA
    - TSLA
    weight_min: 0.05
    weight_max: 0.3
  mean_reversion:
    enabled: false
    symbols:
    - XLU
    - XLP
    weight_min: 0.05
    weight_max: 0.25
  bond_trend:
    enabled: false
    symbols:
    - TLT
    - IEF
    weight_min: 0.05
    weight_max: 0.3
  commodity_momentum:
    enabled: false
    symbols:
    - GLD
    - USO
    weight_min: 0.05
    weight_max: 0.3
  crypto_momentum:
    enabled: false
    symbols:
    - BTC/USD
    - ETH/USD
    weight_min: 0.05
    weight_max: 0.30

# ── Telegram notifications ─────────────────────────────────────────────────────
notifications:
  telegram:
    enabled: true          # master switch — set true to activate
    on_backtest: true       # send summary after each backtest
    on_stress: true         # send results after stress test
    on_regime_change: true  # send alert on HMM regime transition (live)
    on_trade: true# send each individual trade (can be noisy)
